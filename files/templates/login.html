<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SchoolSync SIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .role-tabs { display:flex; gap:8px; margin-bottom:24px; }
    .role-tab {
      flex:1; padding:8px 4px; border-radius:8px; text-align:center;
      font-size:12px; font-weight:700; cursor:pointer; border:1.5px solid #e5e7eb;
      background:#f9fafb; color:#6b7280; transition:all .15s;
    }
    .role-tab.active { background:var(--brand-gradient); color:#fff; border-color:transparent; box-shadow:0 2px 8px rgba(160,24,80,.2); }
    .role-tab:hover:not(.active) { border-color:rgba(160,24,80,.3); color:rgba(160,24,80,.8); }
    .role-icon { font-size:18px; display:block; margin-bottom:3px; }
    .hint-box { background:#f8fafc; border:1px solid #e5e7eb; border-radius:8px; padding:10px 14px; font-size:12px; color:#6b7280; margin-top:16px; }
    .hint-box strong { color:#374151; }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm0 2.27L20 9l-8 4.36L4 9l8-3.73zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
        </svg>
      </div>
      <h1>SchoolSync SIS</h1>
      <p>School Information System</p>
    </div>

    <!-- Role tabs -->
    <div class="role-tabs">
      <div class="role-tab active" id="tab-admin" onclick="setRole('admin')">
        <span class="role-icon">🛡️</span> Admin
      </div>
      <div class="role-tab" id="tab-teacher" onclick="setRole('teacher')">
        <span class="role-icon">👩‍🏫</span> Teacher
      </div>
      <div class="role-tab" id="tab-student" onclick="setRole('student')">
        <span class="role-icon">🎒</span> Student
      </div>
    </div>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="username" id="username-label">Username</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Enter your username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
    </form>

    <div class="hint-box" id="hint-box">
      <strong>Admin:</strong> Use your admin username &amp; password.
    </div>

  </div>
</div>

<script>
const hints = {
  admin:   '<strong>Admin:</strong> Use your admin username &amp; password.',
  teacher: '<strong>Teacher:</strong> Use your assigned username &amp; password.',
  student: '<strong>Student:</strong> Use your <strong>Student ID</strong> as username. Default password is your Student ID.',
};
const labels = {
  admin:   'Username',
  teacher: 'Username',
  student: 'Student ID',
};
const placeholders = {
  admin:   'Enter your username',
  teacher: 'Enter your username',
  student: 'Enter your Student ID (e.g. 2024-00001)',
};

function setRole(role) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + role).classList.add('active');
  document.getElementById('username-label').textContent = labels[role];
  document.getElementById('username').placeholder = placeholders[role];
  document.getElementById('hint-box').innerHTML = hints[role];
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('username').focus();
}
</script>

</body>
</html>
